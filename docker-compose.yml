services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-diet_tracking}
      POSTGRES_USER: ${POSTGRES_USER:-diet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-diet_local_password}
    ports:
      - "5432:5432"
    volumes:
      - diet_tracking_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  diet_tracking_postgres:

